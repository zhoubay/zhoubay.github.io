# Research page — section layout and publication references (metadata in _publications/*.md)

sections:
  - id: plm
    title: "Protein Language Models"
    subtitle: "Structure-aware pretraining, open platforms, and PLM-driven protein engineering"
    accent: "#0d6e8f"
    accent_light: "#e8f4f8"
    projects:
      - slug: SaProt
        name: SaProt
        summary: "General-purpose PLM with a structure-aware vocabulary—residue tokens fused with Foldseek structure tokens—trained on ~40M sequence–structure pairs."

      - slug: SaprotHub
        name: SaprotHub
        summary: "No-code platform on Google Colab for training, sharing, and collaborating on protein ML models—democratizing PLM access for biologists."

      - slug: PLM-guided-eTDG
        name: "PLM-guided eTDG"
        summary: "PLM-guided optimization of uracil-N-glycosylase enables programmable T→G/C base editing with few-shot experimental validation."

      - slug: ESM-Ezy
        name: ESM-Ezy
        summary: "ESM-1b semantic mining discovers multicopper oxidases with superior catalytic and environmental-remediation properties from UniProt."

  - id: multimodal
    title: "Protein–Text Multimodal Intelligence"
    subtitle: "Aligning sequence, structure, and natural language for search, dialogue, and de novo design"
    accent: "#5b4b9a"
    accent_light: "#f0edf8"
    projects:
      - slug: ProTrek
        name: ProTrek
        summary: "Trimodal contrastive model unifying sequence, structure, and function text—advanced cross-modal protein search at billion-protein scale."

      - slug: Evolla
        name: Evolla
        badge: "bioRxiv · under review at Nature"
        summary: "Interactive protein-language model that answers natural-language queries over sequence and structure—generative functional discovery beyond static annotation."

      - slug: Pinal
        name: Pinal
        badge: "bioRxiv · under review at Nature"
        summary: "16B-parameter framework: natural-language instructions → structure generation → sequence design for de novo proteins beyond PDB."

{% include base_path %}
{% if include.cartoon_webp %}
<figure class="{{ include.class | default: 'publication-figure' }}">
  <picture>
    <source srcset="{{ base_path }}/images/{{ include.cartoon_webp }}" type="image/webp">
    <img src="{{ base_path }}/images/{{ include.cartoon_fallback | default: include.cartoon_webp }}"
         alt="{{ include.alt | default: '' }}"
         {% if include.width %}width="{{ include.width }}"{% endif %}
         {% if include.height %}height="{{ include.height }}"{% endif %}
         loading="lazy"
         decoding="async">
  </picture>
</figure>
{% endif %}

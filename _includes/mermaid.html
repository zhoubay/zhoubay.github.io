<!-- Mermaid (opt-in via page.mermaid: true) -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<script src="{{ base_path }}/assets/js/blog-diagram-zoom.js"></script>
<script>
  mermaid.initialize({
    startOnLoad: false,
    theme: "base",
    themeVariables: {
      primaryColor: "#e8f4fd",
      primaryBorderColor: "#4a90d9",
      primaryTextColor: "#1a1a2e",
      lineColor: "#5b6abf",
      secondaryColor: "#f0e6ff",
      tertiaryColor: "#fff",
      noteBkgColor: "#fff9e6",
      noteBorderColor: "#e6c300",
      noteTextColor: "#333",
      actorBkg: "#4a90d9",
      actorTextColor: "#fff",
      actorBorder: "#2c5aa0",
      sequenceNumberColor: "#fff",
      signalColor: "#333"
    },
    sequence: {
      diagramMarginX: 20,
      diagramMarginY: 20,
      actorMargin: 80,
      width: 180,
      height: 50,
      noteMargin: 10,
      messageMargin: 40,
      mirrorActors: true,
      useMaxWidth: true
    }
  });

  document.addEventListener('DOMContentLoaded', function () {
    mermaid.run({ querySelector: '.mermaid' }).then(function () {
      if (typeof initBlogDiagramZoom === 'function') initBlogDiagramZoom();
    });
  });
</script>

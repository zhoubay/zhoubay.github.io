{% if site.data.water_sports %}
<section{% if include.id %} id="{{ include.id }}"{% endif %} class="{{ include.class | default: 'fade-in' }}"{% if include.style %} style="{{ include.style }}"{% endif %}>
  {% include section-header.html title="Water Sports" %}
  {% if site.data.water_sports.intro %}
  <p class="about-block" style="margin-bottom: 1rem;">{{ site.data.water_sports.intro }}</p>
  {% endif %}
  <ul class="interests-list">
    {% for item in site.data.water_sports.items %}
    <li class="interests-list__item">
      <strong>{{ item.title }}</strong>
      <span>{{ item.description }}</span>
    </li>
    {% endfor %}
  </ul>
</section>
{% endif %}
